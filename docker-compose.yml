services:
  backend:
    build:
      context: ./PREDICTION
    container_name: traffic-backend
    command: python server.py
    ports:
      - "5000:5000"
    env_file:
      - ./PREDICTION/.env
    volumes:
      - ./PREDICTION/traffic.db:/app/traffic.db
    restart: unless-stopped

  worker:
    build:
      context: ./PREDICTION
    container_name: traffic-worker
    command: python main.py
    env_file:
      - ./PREDICTION/.env
    volumes:
      - ./PREDICTION/traffic.db:/app/traffic.db
    depends_on:
      - backend
    restart: unless-stopped  # main.py loops forever (predicts every 120s) — keep alive

  frontend:
    build:
      context: ./traffic-map
      args:
        VITE_API_URL: http://localhost:5000
    container_name: traffic-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped